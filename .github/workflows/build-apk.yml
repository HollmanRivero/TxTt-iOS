name: Build Android APK

# Bygger en debug-APK i skyen ved hver push til main, og kan startes manuelt.
# Ferdig APK lastes opp som "artifact" man kan laste ned fra Actions-fanen.

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Kjor hjelpe-actionene paa Node.js 24 (GitHub tvinger dette fra 16. juni 2026).
# Fjerner Node 20-deprecation-advarselen uten aa maatte laase hver action til en
# spesifikk versjon.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install dependencies
        run: npm install

      - name: Create .env.local (from repo secrets, or placeholders)
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" > .env.local
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env.local

      - name: Build web app
        run: npm run build

      - name: Add Android platform
        run: npx cap add android

      - name: Set Android 13/14 SDK levels
        run: |
          sed -i 's/minSdkVersion = [0-9]*/minSdkVersion = 33/' android/variables.gradle
          sed -i 's/compileSdkVersion = [0-9]*/compileSdkVersion = 34/' android/variables.gradle
          sed -i 's/targetSdkVersion = [0-9]*/targetSdkVersion = 34/' android/variables.gradle

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TxTt-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
